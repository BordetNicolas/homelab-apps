apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: airflow
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: workloads
  ignoreDifferences:
    # PVC créé en RWO avant passage à ReadWriteMany dans values — immutable
    - group: ""
      kind: PersistentVolumeClaim
      name: airflow-dags
      namespace: airflow
      jsonPointers:
        - /spec/accessModes
  sources:
    - repoURL: https://airflow.apache.org
      chart: airflow
      targetRevision: "1.21.0"
      helm:
        releaseName: airflow
        valueFiles:
          - $values/clusters/talos-02/manifests/airflow/values.yaml
    - repoURL: https://github.com/BordetNicolas/homelab-apps.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: airflow
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      # Évite que le Secret helm pre-install (broker-url) bloque la sync en PreSync
      - SkipHooks=true
