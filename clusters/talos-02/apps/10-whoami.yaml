apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: whoami
  namespace: argocd
spec:
  project: workloads
  source:
    repoURL: https://github.com/BordetNicolas/homelab-apps.git
    targetRevision: main
    path: clusters/talos-02/manifests/whoami
  destination:
    server: https://kubernetes.default.svc
    namespace: whoami
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
