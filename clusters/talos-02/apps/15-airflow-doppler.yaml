apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: airflow-doppler
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: workloads
  source:
    repoURL: https://github.com/BordetNicolas/homelab-apps.git
    targetRevision: main
    path: clusters/talos-02/manifests/airflow/secrets
  destination:
    server: https://kubernetes.default.svc
    namespace: doppler-operator-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
