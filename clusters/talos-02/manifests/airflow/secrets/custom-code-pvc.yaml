# Volume partagé (RWX) pour les opérateurs custom — synchronisé par git-sync (chart Helm).
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: airflow-custom-code
  namespace: airflow
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: longhorn
  resources:
    requests:
      storage: 1Gi
