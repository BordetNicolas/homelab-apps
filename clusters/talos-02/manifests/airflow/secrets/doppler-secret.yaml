# Synced by Doppler operator from project k8s-talos-pve1 / config prd.
# See ../DOPPLER.md for required secrets in Doppler UI.
apiVersion: secrets.doppler.com/v1alpha1
kind: DopplerSecret
metadata:
  name: airflow-credentials
  namespace: doppler-operator-system
spec:
  tokenSecret:
    name: doppler-service-token
    namespace: doppler-operator-system
  project: "k8s-talos-pve1"
  config: "prd"
  managedSecret:
    name: airflow-credentials
    namespace: airflow
    type: Opaque
  secrets:
    - AIRFLOW_FERNET_KEY
    - AIRFLOW_API_SECRET_KEY
    - AIRFLOW_JWT_SECRET
    - AIRFLOW_POSTGRES_PASSWORD
    - AIRFLOW_ADMIN_PASSWORD
  processors:
    AIRFLOW_FERNET_KEY:
      type: plain
      asName: fernet-key
    AIRFLOW_API_SECRET_KEY:
      type: plain
      asName: api-secret-key
    AIRFLOW_JWT_SECRET:
      type: plain
      asName: jwt-secret
    AIRFLOW_POSTGRES_PASSWORD:
      type: plain
      asName: postgres-password
    AIRFLOW_ADMIN_PASSWORD:
      type: plain
      asName: admin-password
