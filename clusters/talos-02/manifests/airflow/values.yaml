# Apache Airflow Helm chart 1.21 — talos-02 (Airflow 3.2.1, KubernetesExecutor)
# https://airflow.apache.org/docs/helm-chart/stable/

airflowVersion: "3.2.1"
defaultAirflowTag: "3.2.1"

executor: KubernetesExecutor

allowPodLaunching: true

# Opérateurs custom : https://github.com/BordetNicolas/AirflowCustom (dossier operators/)
# Ne pas utiliser volumes/volumeMounts/extraEnv globaux — ils s’appliquent aux Jobs (spec immuable).

x-custom-code-volume: &customCodeVolume
  name: custom-code
  persistentVolumeClaim:
    claimName: airflow-custom-code

x-custom-code-mount: &customCodeMount
  name: custom-code
  mountPath: /opt/airflow/custom_code
  readOnly: true

x-custom-code-env: &customCodeEnv
  name: PYTHONPATH
  value: "/opt/airflow/custom_code/repo"

x-git-sync-custom-code: &gitSyncCustomCode
  name: git-sync-custom-code
  image: registry.k8s.io/git-sync/git-sync:v4.4.2
  imagePullPolicy: IfNotPresent
  securityContext:
    runAsUser: 65533
  env:
    - name: GITSYNC_REPO
      value: https://github.com/BordetNicolas/AirflowCustom.git
    - name: GITSYNC_REF
      value: main
    - name: GIT_SYNC_BRANCH
      value: main
    - name: GITSYNC_DEPTH
      value: "1"
    - name: GITSYNC_ROOT
      value: /git
    - name: GITSYNC_LINK
      value: repo
    - name: GITSYNC_ADD_USER
      value: "true"
    - name: GITSYNC_PERIOD
      value: 30s
    - name: GITSYNC_MAX_FAILURES
      value: "0"
    - name: GITSYNC_HTTP_BIND
      value: :8080
  volumeMounts:
    - name: custom-code
      mountPath: /git

fernetKeySecretName: airflow-credentials
apiSecretKeySecretName: airflow-credentials
jwtSecretName: airflow-credentials

# Ne pas laisser le chart générer postgres:postgres — utiliser la clé `connection` du secret Doppler.
data:
  metadataSecretName: airflow-credentials

redis:
  enabled: false

postgresql:
  enabled: true
  image:
    registry: docker.io
    repository: bitnamilegacy/postgresql
    tag: "17.6.0-debian-12-r4"
    pullPolicy: IfNotPresent
  auth:
    username: airflow
    database: airflow
    existingSecret: airflow-credentials
    secretKeys:
      userPasswordKey: postgres-password

config:
  core:
    load_examples: "False"
  api:
    # URL publique (ingress) — utilisée par le chart pour execution_api_server_url / liens UI
    base_url: https://airflow-test.alexetnico.com
  logging:
    base_log_folder: /opt/airflow/logs

# Bug Airflow 3.x + KubernetesExecutor : hostname vide sur retries → http://:8793 (apache/airflow#65366).
# Si le fichier existe sur le PVC logs, lecture locale au lieu du serveur worker.
airflowLocalSettings: |
  from pathlib import Path

  from airflow.utils.log.file_task_handler import FileTaskHandler

  _orig_read_from_logs_server = FileTaskHandler._read_from_logs_server

  def _read_from_logs_server_local_fallback(self, ti, worker_log_rel_path):
      hostname = getattr(ti, "hostname", None) or ""
      if getattr(ti, "triggerer_job", None):
          hostname = getattr(ti.triggerer_job, "hostname", None) or hostname
      if not str(hostname).strip():
          return self._read_from_local(Path(self.local_base, worker_log_rel_path))
      return _orig_read_from_logs_server(self, ti, worker_log_rel_path)

  FileTaskHandler._read_from_logs_server = _read_from_logs_server_local_fallback

migrateDatabaseJob:
  enabled: true
  useHelmHooks: false
  ttlSecondsAfterFinished: 300
  serviceAccount:
    annotations:
      argocd.argoproj.io/sync-wave: "-7"
  jobAnnotations:
    # Avant les Deployments (wave 0) : sinon ArgoCD n’applique jamais le Job (pods bloqués sur wait-for-airflow-migrations).
    argocd.argoproj.io/sync-wave: "-5"

# Ne pas définir webserver.defaultUser : le chart y lie createUserJob.enabled (déprécié).
# L’admin est créé par createUserJob ci-dessous (mot de passe Doppler).

apiServer:
  enabled: true
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      memory: 1Gi

createUserJob:
  enabled: true
  useHelmHooks: false
  ttlSecondsAfterFinished: 300
  serviceAccount:
    annotations:
      argocd.argoproj.io/sync-wave: "4"
  jobAnnotations:
    argocd.argoproj.io/sync-wave: "5"
  extraVolumes:
    - name: airflow-credentials
      secret:
        secretName: airflow-credentials
  extraVolumeMounts:
    - name: airflow-credentials
      mountPath: /etc/airflow/credentials
      readOnly: true
  args:
    - bash
    - -c
    - |
      set -euo pipefail
      PASS="$(tr -d '\n' < /etc/airflow/credentials/admin-password)"
      if airflow users list 2>/dev/null | grep -qw admin; then
        airflow users reset-password -u admin -p "${PASS}"
      else
        airflow users create \
          -r Admin -u admin -e admin@alexetnico.com \
          -f admin -l user -p "${PASS}"
      fi

workers:
  celery:
    # Pas de workers Celery (executor = KubernetesExecutor uniquement).
    enableDefault: false
  kubernetes:
    # Obligatoire si enableDefault: false — sinon le SA « airflow-worker » n’existe pas
    # et les pods de tâches échouent en 403 (serviceaccount "airflow-worker" not found).
    serviceAccount:
      create: true
    extraVolumes:
      - *customCodeVolume
    extraVolumeMounts:
      - *customCodeMount
    env:
      - *customCodeEnv

scheduler:
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      memory: 1Gi
  extraVolumes:
    - *customCodeVolume
  extraVolumeMounts:
    - *customCodeMount
  env:
    - *customCodeEnv
  extraContainers:
    - *gitSyncCustomCode

dagProcessor:
  extraVolumes:
    - *customCodeVolume
  extraVolumeMounts:
    - *customCodeMount
  env:
    - *customCodeEnv
  extraContainers:
    - *gitSyncCustomCode

triggerer:
  enabled: true
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi
  extraVolumes:
    - *customCodeVolume
  extraVolumeMounts:
    - *customCodeMount
  env:
    - *customCodeEnv
  extraContainers:
    - *gitSyncCustomCode

dags:
  persistence:
    enabled: true
    size: 5Gi
    storageClassName: longhorn
    # RWO bloque le triggerer si scheduler/dag-processor sont sur un autre nœud
    accessMode: ReadWriteMany
  gitSync:
    enabled: true
    repo: https://github.com/BordetNicolas/DAGs.git
    branch: main
    ref: main
    subPath: dags
    depth: 1
    period: 30s

logs:
  persistence:
    enabled: true
    size: 10Gi
    storageClassName: longhorn
    # Le PVC logs du chart est en ReadWriteMany par défaut (lecture api-server + écriture workers).

ingress:
  web:
    enabled: false
  apiServer:
    enabled: true
    ingressClassName: nginx
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
      external-dns.alpha.kubernetes.io/set: cloudflare
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
      nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    hosts:
      - name: airflow-test.alexetnico.com
        tls:
          enabled: true
          secretName: airflow-tls

cleanup:
  enabled: true
