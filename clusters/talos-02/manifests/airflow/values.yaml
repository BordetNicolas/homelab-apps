# Apache Airflow Helm chart 1.21 — talos-02 (Airflow 3.2.1, KubernetesExecutor)
# https://airflow.apache.org/docs/helm-chart/stable/

airflowVersion: "3.2.1"
defaultAirflowTag: "3.2.1"

executor: KubernetesExecutor

allowPodLaunching: true

fernetKeySecretName: airflow-credentials
apiSecretKeySecretName: airflow-credentials
jwtSecretName: airflow-credentials

redis:
  enabled: false

postgresql:
  enabled: true
  image:
    registry: docker.io
    repository: bitnamilegacy/postgresql
    tag: "17.6.0-debian-12-r4"
    pullPolicy: IfNotPresent
  auth:
    username: airflow
    database: airflow
    existingSecret: airflow-credentials
    secretKeys:
      userPasswordKey: postgres-password

config:
  core:
    load_examples: "False"

migrateDatabaseJob:
  enabled: true
  useHelmHooks: false

webserver:
  defaultUser:
    enabled: true
    role: Admin
    username: admin
    email: admin@alexetnico.com
    firstName: admin
    lastName: user
    password: ""

apiServer:
  enabled: true
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      memory: 1Gi

createUserJob:
  enabled: true
  useHelmHooks: false
  extraVolumes:
    - name: airflow-credentials
      secret:
        secretName: airflow-credentials
  extraVolumeMounts:
    - name: airflow-credentials
      mountPath: /etc/airflow/credentials
      readOnly: true
  args:
    - bash
    - -c
    - |
      set -euo pipefail
      PASS="$(tr -d '\n' < /etc/airflow/credentials/admin-password)"
      exec airflow users create \
        -r Admin -u admin -e admin@alexetnico.com \
        -f admin -l user -p "${PASS}"

workers:
  celery:
    enableDefault: false

scheduler:
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      memory: 1Gi

triggerer:
  enabled: true
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi

dags:
  persistence:
    enabled: true
    size: 5Gi
    storageClassName: longhorn
  gitSync:
    enabled: false

logs:
  persistence:
    enabled: true
    size: 10Gi
    storageClassName: longhorn

ingress:
  web:
    enabled: false
  apiServer:
    enabled: true
    ingressClassName: nginx
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
      external-dns.alpha.kubernetes.io/set: cloudflare
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
      nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    hosts:
      - name: airflow-test.alexetnico.com
        tls:
          enabled: true
          secretName: airflow-tls

cleanup:
  enabled: true
